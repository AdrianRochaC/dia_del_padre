<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Día del Padre!</title>
    <meta name="description" content="Una página especial para celebrar el Día del Padre.">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/e/ea/Superman_shield.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Superman_shield.svg" alt="Logo de Superman" class="superman-logo">
        <h1>¡Feliz Día del Padre!</h1>
        <div class="decorative-line"></div>
        <p class="subtitle">
            Para el mejor papá del mundo. Gracias por tu amor, tu paciencia y por ser siempre nuestra más grande inspiración. ¡Disfruta esta canción y estos bonitos recuerdos!
        </p>
        
        <div class="image-gallery">
            <img src="images/foto_1.jpeg" alt="Recuerdo 1">
            <img src="images/foto_3.jpeg" alt="Recuerdo 3">
            <img src="images/foto_2.jpeg" alt="Recuerdo 2" class="full-width">
        </div>

        <div class="custom-player-wrapper">
            <div class="custom-player">
                <img src="https://img.youtube.com/vi/BNemx9DcqDs/maxresdefault.jpg" alt="Portada de la canción" class="player-cover">
                <div class="player-right">
                    <div class="player-info">
                        <h4 class="song-title">Mi Padre Me Enseñó</h4>
                        <p class="song-artist">AIM WIND</p>
                    </div>
                    <div class="player-controls">
                        <button id="playBtn" class="play-btn">
                            <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div style="position: absolute; width: 0; height: 0; overflow: hidden; opacity: 0;">
                <div id="ytplayer"></div>
            </div>
        </div>
    </div>

    <script>
        // Cargar YouTube IFrame API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                height: '200',
                width: '200',
                videoId: 'BNemx9DcqDs',
                playerVars: { 'playsinline': 1, 'controls': 0 },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        var playBtn = document.getElementById('playBtn');
        var isPlaying = false;

        playBtn.addEventListener('click', function() {
            if (player && typeof player.playVideo === 'function') {
                if (isPlaying) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            }
        });

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                document.getElementById('icon-play').style.display = 'none';
                document.getElementById('icon-pause').style.display = 'block';
                isPlaying = true;
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                document.getElementById('icon-play').style.display = 'block';
                document.getElementById('icon-pause').style.display = 'none';
                isPlaying = false;
            }
        }
    </script>
</body>
</html>
